<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta property="og:title" content="データ追加">
  <meta property="og:description" content="データ追加">
  <meta property="og:image" content="https://kaniten0410-lang.github.io/recipe-summary/image/tai.png">
  <title>データ追加</title>
  <link rel="stylesheet" href="../../CSS/style.css">
  <link rel="stylesheet" href="../../CSS/management.css">
  <link rel="icon" href="../../image/icon-512.png">
</head>
<body>
  <h1>✍ データ追加</h1>

  <form id="addform">
    <ul>
      <li class="section">
        <h2>料理名</h2>
        <input type="text" name="name" id="name" required>
      </li>
      <li class="section">
        <h2>料理フラグ</h2>
        <div class="menu-buttons">
          <button type="button" class="teal-btn menu-btn" onclick="selectMenu('isGohan', 'cook_true')" id="cook_true">true</button>
          <button type="button" class="teal-btn menu-btn" onclick="selectMenu('isGohan', 'cook_false')" id="cook_false" >False</button>
        </div>
        <input type="hidden" name="isGohan" id="isGohan" value="cook_false">
      </li>
      <li class="section">
        <h2>お菓子フラグ</h2>
        <div class="menu-buttons">
          <button type="button" class="teal-btn menu-btn" onclick="selectMenu('isOkashi', 'sweet_true')" id="sweet_true" >true</button>
          <button type="button" class="teal-btn menu-btn" onclick="selectMenu('isOkashi', 'sweet_false')" id="sweet_false" >False</button>
        </div>
        <input type="hidden" name="isOkashi" id="isOkashi" value="sweet_false">
      </li>
      <li class="section">
        <h2>URL</h2>
        <p>※URL無しの場合は、「URL無し」と記載</p>
        <input type="text" name="url" id="url" required>
      </li>
      <li class="section">
        <h2>手間</h2>
				<select name="tema" id="tema">
					<option value="簡単" selected>簡単</option>
					<option value="まぁ簡単">まぁ簡単</option>
					<option value="ちょっと面倒">ちょっと面倒</option>
					<option value="面倒">面倒</option>
					<option value="わからない">わからない</option>
				</select>
      </li>
      <li class="section">
        <h2>定番フラグ</h2>
        <div class="menu-buttons">
          <button type="button" class="teal-btn menu-btn" onclick="selectMenu('isTeiban', 'teiban_true')" id="teiban_true" >true</button>
          <button type="button" class="teal-btn menu-btn" onclick="selectMenu('isTeiban', 'teiban_false')" id="teiban_false" >False</button>
        </div>
        <input type="hidden" name="isTeiban" id="isTeiban" value="teiban_false">
      </li>
      <li class="section">
        <h2>ジャンル</h2>
        <input type="text" name="genre" id="genre" required>
      </li>
      <li class="section">
        <h2>メモ</h2>
        <input type="text" name="memo" id="memo">
      </li>
    </ul>
    <button type="button" class="decision-button" onclick="saveData()">決定！</button>
  </form>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../../javascript/firebase.js"></script>
  <script src="../../javascript/constants.js"></script>
  <script src="../../javascript/management.js"></script>
  <script src="../../javascript/management-add.js"></script>
</body>
</html>
